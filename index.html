.search{flex:1;min-width:200px}

.filters{display:flex;flex-wrap:wrap;gap:8px}
.filter-btn{padding:8px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;font-size:13px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#38bdf8;border-color:#38bdf8;color:#0f172a}

.view-btn{padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#94a3b8;font-size:13px;cursor:pointer}
.view-btn.active{background:#38bdf8;color:#0f172a}
.content{padding:0 24px 40px;max-width:1200px;margin:0 auto}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
.card:hover{border-color:#38bdf8;transform:translateY(-2px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.card-title{font-size:16px;font-weight:600;color:#f8fafc;line-height:1.4;flex:1}
.card-date{font-size:12px;color:#64748b;white-space:nowrap}

.tag.severity-medium{background:rgba(234,179,8,.2);color:#eab308;border:1px solid rgba(234,179,8,.4)}
.tag.severity-low{background:rgba(148,163,184,.2);color:#94a3b8;border:1px solid rgba(148,163,184,.4)}
.tag.category{background:rgba(56,189,248,.15);color:#38bdf8;border:1px solid rgba(56,189,248,.3)}
.tag.scope{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3)}

.card-footer a:hover{text-decoration:underline}

.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:#334155}
.timeline-item{position:relative;margin-bottom:24px;padding-left:24px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid #334155;background:#0f172a}

.timeline-item.severity-high::before{border-color:#f97316;background:#f97316}

.modal-overlay.active{display:flex}

    keyInfo:["风险一: 模型记忆泄露（训练数据敏感信息）","风险二: 用户隐私泄露（业务数据权限过大）","监管趋势: 多国纳入专项检查","防护方案: 数据识别-流转监控-输出脱敏-合规审计","实践案例: 悬镜灵境 AIDR","关键建议: 最小权限原则+数据脱敏"],
    source:["https://blog.csdn.net/weixin_64810147/article/details/160363642"]
  },
  {
    id:15,title:"2026 AI 法规更新：软件测试从业者策略大调整",date:"2026-06-06",
    category:"政策监管",severity:"Medium",scope:"LLM",
    description:"2026年 AI 法规更新要求软件测试从业者进行策略大调整。法规明确企业对开源 AI 工具的数据泄露承担连带责任，测试案例必须覆盖数据外发权限、动态加密和异常操作预警。",
    keyInfo:["法规: 《人工智能系统可测试性认证管理办法》","企业责任: 开源AI工具数据泄露承担连带责任","测试要求: 数据外发权限+动态加密+异常预警","欧盟AI法案: 高风险系统准入制","透明度: AI生成文本需带数字水印","处罚: 最高年收入4%"],
    source:["https://blog.csdn.net/2501_94449311/article/details/157548761"]
  }
];

const categories = ['全部','安全漏洞','政策监管','行业标准','企业合规'];
const scopes = ['全部','LLM','Agent框架','基础设施','数据隐私'];
const severities = {'Critical':'严重','High':'高危','Medium':'中危','Low':'低危'};

let currentView = 'cards';
let currentCategory = '全部';
let currentScope = '全部';
let searchQuery = '';

function init(){
  renderStats();
  renderFilters();
  bindEvents();
  renderContent();
}

function renderStats(){
  const total = data.length;
  const vuln = data.filter(d=>d.category==='安全漏洞').length;
  const policy = data.filter(d=>d.category==='政策监管').length;
  const standard = data.filter(d=>d.category==='行业标准').length;
  const compliance = data.filter(d=>d.category==='企业合规').length;
  const criticalHigh = data.filter(d=>d.severity==='Critical'||d.severity==='High').length;
  const dates = data.map(d=>new Date(d.date));
  const latest = new Date(Math.max(...dates));
  const latestStr = latest.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="value">${total}</div><div class="label">追踪事件</div></div>
    <div class="stat-card critical"><div class="value">${vuln}</div><div class="label">安全漏洞</div></div>
    <div class="stat-card high"><div class="value">${policy}</div><div class="label">政策监管</div></div>
    <div class="stat-card medium"><div class="value">${standard}</div><div class="label">行业标准</div></div>
    <div class="stat-card"><div class="value">${compliance}</div><div class="label">企业合规</div></div>
    <div class="stat-card critical"><div class="value">${criticalHigh}</div><div class="label">严重/高危</div></div>
  `;
}

function renderFilters(){
  const catBtns = categories.map(c=>`<button class="filter-btn ${currentCategory===c?'active':''}" data-filter="cat" data-value="${c}">${c}</button>`).join('');
  const scopeBtns = scopes.map(s=>`<button class="filter-btn ${currentScope===s?'active':''}" data-filter="scope" data-value="${s}">${s}</button>`).join('');
  document.getElementById('filterGroup').innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center"><span style="font-size:12px;color:#64748b">分类:</span>'+catBtns+'</div><div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center"><span style="font-size:12px;color:#64748b">范围:</span>'+scopeBtns+'</div>';
}

function getFilteredData(){
  return data.filter(d=>{
    if(currentCategory!=='全部'&&d.category!==currentCategory) return false;
    if(currentScope!=='全部'&&d.scope!==currentScope) return false;
    if(searchQuery){
      const q = searchQuery.toLowerCase();
      return d.title.toLowerCase().includes(q)||d.description.toLowerCase().includes(q)||d.scope.toLowerCase().includes(q)||d.category.toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function renderContent(){
  const filtered = getFilteredData();
  if(filtered.length===0){
    document.getElementById('content').innerHTML = '<div class="no-results"><div class="no-results-icon">🔍</div>未找到匹配的事件</div>';
    return;
  }
  if(currentView==='cards') renderCards(filtered);
  else if(currentView==='timeline') renderTimeline(filtered);
  else renderTable(filtered);
}

function renderCards(items){
  document.getElementById('content').innerHTML = '<div class="cards">'+items.map(d=>`
    <div class="card" onclick="openModal(${d.id})">
      <div class="card-header"><div class="card-title">${d.title}</div><div class="card-date">${d.date}</div></div>
      <div class="card-meta">
        <span class="tag severity-${d.severity.toLowerCase()}">${severities[d.severity]}</span>
        <span class="tag category">${d.category}</span>
        <span class="tag scope">${d.scope}</span>
      </div>
      <div class="card-desc">${d.description}</div>
      <div class="card-footer"><span>${d.keyInfo.length} 项关键信息</span><a href="${d.source[0]}" target="_blank" onclick="event.stopPropagation()">查看来源 &rarr;</a></div>
    </div>
  `).join('')+'</div>';
}

function renderTimeline(items){
  document.getElementById('content').innerHTML = '<div class="timeline">'+items.map(d=>`
    <div class="timeline-item severity-${d.severity.toLowerCase()}">
      <div class="timeline-date">${d.date}</div>
      <div class="timeline-title" onclick="openModal(${d.id})">${d.title}</div>
      <div class="timeline-meta">
        <span class="tag severity-${d.severity.toLowerCase()}">${severities[d.severity]}</span>
        <span class="tag category">${d.category}</span>
        <span class="tag scope">${d.scope}</span>
      </div>
      <div class="card-desc">${d.description}</div>
    </div>
  `).join('')+'</div>';
}

function renderTable(items){
  document.getElementById('content').innerHTML = '<div class="table-container"><table class="table"><thead><tr><th>事件</th><th>日期</th><th>分类</th><th>严重程度</th><th>影响范围</th><th>来源</th></tr></thead><tbody>'+items.map(d=>`
    <tr>
      <td class="title-cell" onclick="openModal(${d.id})">${d.title}</td>
      <td>${d.date}</td>
      <td><span class="tag category">${d.category}</span></td>
      <td><span class="tag severity-${d.severity.toLowerCase()}">${severities[d.severity]}</span></td>
      <td><span class="tag scope">${d.scope}</span></td>
      <td><a href="${d.source[0]}" target="_blank">🔗</a></td>
    </tr>
  `).join('')+'</tbody></table></div>';
}

function openModal(id){
  const d = data.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('modalTitle').textContent = d.title;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-tags">
      <span class="tag severity-${d.severity.toLowerCase()}">${severities[d.severity]}</span>
      <span class="tag category">${d.category}</span>
      <span class="tag scope">${d.scope}</span>
      <span class="tag">📅 ${d.date}</span>
    </div>
    <div class="modal-section"><h3>事件概述</h3><p>${d.description}</p></div>
    <div class="modal-section"><h3>关键信息</h3>${d.keyInfo.map(k=>`<p>• ${k}</p>`).join('')}</div>
    <div class="modal-section"><h3>信息来源</h3>${d.source.map(s=>`<p><a href="${s}" class="link" target="_blank">${s}</a></p>`).join('')}</div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
}

function bindEvents(){
  document.querySelectorAll('.view-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      renderContent();
    });
  });
  document.getElementById('filterGroup').addEventListener('click',e=>{
    if(e.target.classList.contains('filter-btn')){
      const type = e.target.dataset.filter;
      const val = e.target.dataset.value;
      if(type==='cat') currentCategory = val;
      else currentScope = val;
      renderFilters();
      renderContent();
    }
  });
  document.getElementById('searchInput').addEventListener('input',e=>{
    searchQuery = e.target.value.trim();
    renderContent();
  });
  document.getElementById('modalOverlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('modalOverlay')) closeModal();
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeModal();
  });
}

init();
</script>
</body>
</html>
